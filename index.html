<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Preparation (Operator Logic)</title>

<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#e0f2fe,#f8fafc);}
h1{text-align:center;padding:18px;color:#fff;background:linear-gradient(90deg,#2563eb,#06b6d4);margin:0;font-weight:900;}
.container{padding:16px}
.card{background:rgba(255,255,255,0.75);backdrop-filter:blur(12px);border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 10px 25px rgba(0,0,0,0.08);}
.card.cow{border-left:6px solid #7c3aed;}
.card.gold{border-left:6px solid #f59e0b;}
.card.tmate{border-left:6px solid #dc2626;}
.card.cow h3{color:#7c3aed;}
.card.gold h3{color:#ea580c;}
.card.tmate h3{color:#dc2626;}
h3{margin-bottom:14px;font-weight:900;}
.row{display:flex;gap:12px;margin-top:10px;}
.col{flex:1;min-width:0;}
.field{position:relative;margin-top:14px;}
.field input{width:100%;padding:14px;border-radius:12px;border:2px solid #cbd5f5;box-sizing:border-box;font-size:20px;font-weight:600;color:#111827;}
.field input:focus{border-color:#2563eb;box-shadow:0 0 8px rgba(37,99,235,0.3);}
.field label{position:absolute;top:-8px;left:10px;background:#fff;padding:2px 6px;font-size:12px;font-weight:800;color:#1e40af;border-radius:6px;}
button{width:100%;padding:16px;border:none;border-radius:16px;margin-top:12px;background:linear-gradient(90deg,#16a34a,#22c55e);color:#fff;font-weight:900;}
.toggle{background:#2563eb;display:none;}
table{width:100%;margin-top:14px;border-collapse:collapse;display:none;background:#fff;border-radius:12px;}
th,td{padding:12px;text-align:center;}
th{background:#3b82f6;color:white;}
.total{background:#fde68a;font-weight:900;}
.calc{display:none;margin-top:14px;}
.calc-card{margin-bottom:16px;padding:16px;border-radius:16px;background:#ffffff;box-shadow:0 6px 18px rgba(0,0,0,0.1);}
.panel{margin-top:10px;padding:12px;border-radius:12px;}
.fat{background:#fff7ed;border-left:5px solid #f97316;}
.snf{background:#eff6ff;border-left:5px solid #2563eb;}
.step{margin-bottom:6px;font-size:14px;}
</style>
</head>

<body>

<h1>Batch Preparation <span style="font-size:14px;font-weight:600;">(Operator Logic)</span></h1>

<div class="container">
<div style="background:#ffffffcc;border-radius:14px;padding:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-weight:800;">
<span>Calculation Mode</span>
<select id="mode" style="padding:6px;border-radius:8px;">
<option value="plant">Plant Mode</option>
<option value="density">Density Mode</option>
</select>
</div>

<div class="card cow">
<h3>Cow Milk</h3>
<div class="field"><label>Batch Qty (L)</label><input id="T" type="number" oninput="updateRaw()"></div>
<div class="row">
<div class="col"><div class="field"><label>Water (L)</label><input id="W" type="number" oninput="updateRaw()"></div></div>
<div class="col"><div class="field"><label>Skim (L)</label><input id="S" type="number" oninput="updateRaw()"></div></div>
</div>
<div class="row">
<div class="col"><div class="field"><label>Leak Qty</label><input id="LQ" type="number" oninput="updateRaw()"></div></div>
<div class="col"><div class="field"><label>Fat %</label><input id="LF" type="number"></div></div>
<div class="col"><div class="field"><label>SNF %</label><input id="LS" type="number"></div></div>
</div>
<div class="field"><label>Raw Milk Qty (L)</label><input id="R" type="number" readonly></div>
<div class="row">
<div class="col"><div class="field"><label>Fat %</label><input id="F" type="number"></div></div>
<div class="col"><div class="field"><label>SNF %</label><input id="SNF" type="number"></div></div>
</div>
</div>

<div class="card gold">
<h3>Gold Milk</h3>
<div class="field"><label>Batch Qty (L)</label><input id="GT" type="number" oninput="GR.value=this.value"></div>
<div class="field"><label>Raw Milk (L)</label><input id="GR" type="number" readonly></div>
<div class="row">
<div class="col"><div class="field"><label>Fat %</label><input id="GF" type="number"></div></div>
<div class="col"><div class="field"><label>SNF %</label><input id="GS" type="number"></div></div>
</div>
</div>

<div class="card tmate">
<h3>TMate Milk</h3>
<div class="field"><label>Batch Qty (L)</label><input id="TT" type="number" oninput="TR.value=this.value"></div>
<div class="field"><label>Raw Milk (L)</label><input id="TR" type="number" readonly></div>
<div class="row">
<div class="col"><div class="field"><label>Fat %</label><input id="TF" type="number"></div></div>
<div class="col"><div class="field"><label>SNF %</label><input id="TS" type="number"></div></div>
</div>
</div>

<button onclick="calc()">Calculate</button>

<table id="tbl">
<tr><th>Milk</th><th>BO (Cans)</th><th>SMP (Bags)</th></tr>
<tbody id="res"></tbody>
<tr class="total"><td>Total</td><td id="tbo"></td><td id="tsmp"></td></tr>
</table>

<button id="btn" class="toggle" onclick="toggle()">View Calculation</button>
<div id="calc" class="calc"></div>

</div>

<script>
function clean(n){let x=Math.round(n*10)/10;return (x%1===0)?x.toFixed(0):x.toFixed(1);}

function updateRaw(){
let t=+T.value||0,w=+W.value||0,s=+S.value||0,l=+LQ.value||0;
R.value=Math.max(0,t-w-s-l);
}

function toggle(){
let c=document.getElementById("calc");
c.style.display=(c.style.display==="block")?"none":"block";
}

function density(f,s){
return 1+(4*(s-(0.2*f)-0.36))/1000;
}

function buildCard(name,t,r,f,snf,s,lq,lf,ls,fatPct,snfPct,mode){
let d=1;
if(mode==="density"){
if(name==="Cow Milk") d=1.029;
else if(name==="Gold Milk") d=1.031;
else d=1.034;
}

let rawD=(mode==="density")?density(f,snf):1;

let tTxt=(mode==="density")?`(${t}×${d.toFixed(3)})`:`${t}`;
let rTxt=(mode==="density")?`(${r}×${rawD.toFixed(3)})`:`${r}`;

let t_mass=t*d;
let r_mass=r*rawD;

let fatAvail=(r_mass*f/100);
let snfAvail=(r_mass*snf/100);

let fatAvailTxt=`[ ${rTxt} × ${f}/100 ]`;
let snfAvailTxt=`[ ${rTxt} × ${snf}/100 ]`;

if(name==="Cow Milk"){
let leakD=(mode==="density")?density(lf,ls):1;
let l_mass=lq*leakD;
let lTxt=(mode==="density")?`(${lq}×${leakD.toFixed(3)})`:`${lq}`;
if(lq){
fatAvail+=l_mass*lf/100;
snfAvail+=l_mass*ls/100;
fatAvailTxt+=` + [ ${lTxt} × ${lf}/100 ]`;
snfAvailTxt+=` + [ ${lTxt} × ${ls}/100 ]`;
}
}

if(s){
let sTxt=(mode==="density")?`(${s}×1.030)`:`${s}`;
snfAvail+=((mode==="density")?(s*1.03):s)*8.4/100;
snfAvailTxt+=` + [ ${sTxt} × 8.4/100 ]`;
}

let fatReq=t_mass*fatPct/100;
let fatReqTxt=`${tTxt} × ${fatPct}/100`;

let fatDef=fatReq-fatAvail;
let BO=fatDef/0.825;
let cans=BO/((mode==="density")?40:40);

let snfReq=t_mass*snfPct/100;
let snfReqTxt=`${tTxt} × ${snfPct}/100`;

let snfDef=snfReq-snfAvail;
let SMP=snfDef/0.965;
let bags=SMP/25;

return `<div class="calc-card"><h3>${name}</h3>
<div class="panel fat">
<h4>FAT</h4>
<div class="step">Required: ${fatReqTxt} = ${clean(fatReq)} kg</div>
<div class="step">Available: ${fatAvailTxt} = ${clean(fatAvail)} kg</div>
<div class="step">Deficit: ${clean(fatDef)} kg</div>
<div class="step">B.Oil Required: ${clean(BO)} kg</div>
<div class="step">B.Oil: ${clean(cans)} Cans</div>
</div>
<div class="panel snf">
<h4>SNF</h4>
<div class="step">Required: ${snfReqTxt} = ${clean(snfReq)} kg</div>
<div class="step">Available: ${snfAvailTxt} = ${clean(snfAvail)} kg</div>
<div class="step">Deficit: ${clean(snfDef)} kg</div>
<div class="step">SMP Required: ${clean(SMP)} kg</div>
<div class="step">SMP: ${clean(bags)} Bags</div>
</div></div>`;
}

function calc(){
let mode=document.getElementById("mode").value;
let rows="",cards="",tBO=0,tSMP=0;

/* Cow */
if(T.value){
let t=+T.value,r=+R.value,f=+F.value,snf=+SNF.value;
let s=+S.value||0,lq=+LQ.value||0,lf=+LF.value||0,ls=+LS.value||0;

let d=(mode==="density")?1.029:1;
let rawD=(mode==="density")?density(f,snf):1;
let leakD=(mode==="density")?density(lf,ls):1;

let t_mass=t*d;
let r_mass=r*rawD;
let l_mass=lq*leakD;

let BO=((t_mass*3.5/100)-((r_mass*f/100)+(l_mass*lf/100)))/0.825;
let SMP=((t_mass*8.5/100)-((r_mass*snf/100)+((mode==="density")?(s*1.03):s)*8.4/100+(l_mass*ls/100)))/0.965;

let cans=BO/((mode==="density")?40:40);
let bags=SMP/25;

rows+=`<tr><td>Cow</td><td>${clean(cans)}</td><td>${clean(bags)}</td></tr>`;
tBO+=cans;tSMP+=bags;
cards+=buildCard("Cow Milk",t,r,f,snf,s,lq,lf,ls,3.5,8.5,mode);
}

/* Gold */
if(GT.value){
let t=+GT.value,r=+GR.value,f=+GF.value,snf=+GS.value;
let d=(mode==="density")?1.031:1;
let rawD=(mode==="density")?density(f,snf):1;

let t_mass=t*d;
let r_mass=r*rawD;

let BO=((t_mass*4.5/100)-(r_mass*f/100))/0.825;
let SMP=((t_mass*9/100)-(r_mass*snf/100))/0.965;

let cans=BO/((mode==="density")?40:40);
let bags=SMP/25;

rows+=`<tr><td>Gold</td><td>${clean(cans)}</td><td>${clean(bags)}</td></tr>`;
tBO+=cans;tSMP+=bags;
cards+=buildCard("Gold Milk",t,r,f,snf,0,0,0,0,4.5,9,mode);
}

/* TMate */
if(TT.value){
let t=+TT.value,r=+TR.value,f=+TF.value,snf=+TS.value;
let d=(mode==="density")?1.034:1;
let rawD=(mode==="density")?density(f,snf):1;

let t_mass=t*d;
let r_mass=r*rawD;

let BO=((t_mass*5.5/100)-(r_mass*f/100))/0.825;
let SMP=((t_mass*10/100)-(r_mass*snf/100))/0.965;

let cans=BO/((mode==="density")?40:40);
let bags=SMP/25;

rows+=`<tr><td>TMate</td><td>${clean(cans)}</td><td>${clean(bags)}</td></tr>`;
tBO+=cans;tSMP+=bags;
cards+=buildCard("TMate Milk",t,r,f,snf,0,0,0,0,5.5,10,mode);
}

if(rows){
document.getElementById("res").innerHTML=rows;
document.getElementById("tbl").style.display="table";
document.getElementById("tbo").innerText=clean(tBO);
document.getElementById("tsmp").innerText=clean(tSMP);
document.getElementById("calc").innerHTML=cards;
document.getElementById("btn").style.display="block";
}
}
</script>

</body>
</html>
